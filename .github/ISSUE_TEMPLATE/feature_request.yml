name: Feature request
description: Propose a deterministic analysis, plugin, output, or workflow improvement.
title: "[Feature]: "
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem to solve
      description: Describe the engineering or review problem, not only the proposed interface.
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed behavior
      description: Explain the expected inputs, outputs, and user workflow.
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Analyzer plugin
        - Deterministic enrichment or rule
        - Output or artifact
        - Architecture graph
        - CLI or configuration
        - AI explanation
        - Documentation or developer experience
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered

