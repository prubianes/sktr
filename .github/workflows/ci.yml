name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.13", "3.14"]

    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v7
        with:
          python-version: ${{ matrix.python-version }}
          enable-cache: true
      - name: Install locked environment
        run: uv sync --frozen --python ${{ matrix.python-version }}
      - name: Run tests
        run: uv run --python ${{ matrix.python-version }} pytest -q
      - name: Build distributions
        run: uv build
      - name: Verify source distribution contents
        run: |
          tar -tzf dist/sktr-*.tar.gz | grep 'docs/schema/sktr-review-0.1.schema.json'
          tar -tzf dist/sktr-*.tar.gz | grep '/LICENSE'
      - name: Install and smoke test wheel
        run: |
          uv venv --python ${{ matrix.python-version }} .smoke-venv
          uv pip install --python .smoke-venv/bin/python dist/sktr-*.whl
          .smoke-venv/bin/sktr --version
          .smoke-venv/bin/sktr plugins doctor --config examples/python-basic/sktr.yml
          .smoke-venv/bin/sktr ai doctor --config examples/python-basic/sktr.yml
          .smoke-venv/bin/sktr review --config examples/python-basic/sktr.yml --no-ai --format json --output /tmp/sktr-review.json
          .smoke-venv/bin/sktr graph --config examples/mixed-language-ci/sktr.yml --scope repository --output /tmp/architecture.mmd
      - name: Validate canonical artifact
        run: |
          uv run python -c 'import json; from pathlib import Path; from jsonschema import validate; validate(json.loads(Path("/tmp/sktr-review.json").read_text()), json.loads(Path("docs/schema/sktr-review-0.1.schema.json").read_text()))'

